name: Update Financial Data

on:
  schedule:
    # 每小时更新一次 (UTC 时间)
    - cron: '0 * * * *'
  workflow_dispatch: # 手动触发

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Fetch financial data
        run: python scripts/fetch_data.py

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --exit-code static/data/; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add static/data/
          git commit -m "chore: update financial data [skip ci]"
          git push

      - name: Trigger Cloudflare Pages deployment
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          # 使用 Cloudflare Pages 的 Deploy Hook 触发重新部署
          # 需要在 GitHub Secrets 中设置 CF_DEPLOY_HOOK_URL
          if [ -n "$CF_DEPLOY_HOOK_URL" ]; then
            curl -X POST "$CF_DEPLOY_HOOK_URL"
          fi
        env:
          CF_DEPLOY_HOOK_URL: ${{ secrets.CF_DEPLOY_HOOK_URL }}
